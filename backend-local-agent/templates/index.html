<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Agent Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8">
    <div class="max-w-2xl mx-auto bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-700">
        <h1 class="text-3xl font-bold mb-6 text-emerald-400">Data Leak Monitor - Local Agent</h1>
        
        <div class="mb-6 p-4 rounded-lg bg-gray-900 border border-gray-700">
            <h2 class="text-xl font-semibold mb-2">Status overview</h2>
            <div class="flex items-center space-x-4">
                <span class="text-gray-400">Agent Status:</span>
                <span id="status-badge" class="px-3 py-1 rounded-full text-sm font-semibold {{ 'bg-green-500/20 text-green-400' if status == 'Running' else 'bg-red-500/20 text-red-400' }}">
                    {{ status }}
                </span>
            </div>
            <div class="flex items-center space-x-4 mt-2">
                <span class="text-gray-400">Packets in Buffer:</span>
                <span class="font-mono text-blue-400">{{ buffer_size }}</span>
            </div>
        </div>

        <div class="flex space-x-4">
            <button onclick="startAgent()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                Start Sniffing
            </button>
            <button onclick="stopAgent()" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                Stop Sniffing
            </button>
        </div>
    </div>

    <script>
        async function startAgent() {
            const res = await fetch('/start', {method: 'POST'});
            if (res.ok) window.location.reload();
        }
        async function stopAgent() {
            const res = await fetch('/stop', {method: 'POST'});
            if (res.ok) window.location.reload();
        }
        // Auto refresh every 5 seconds if running
        if ("{{ status }}" === "Running") {
            setTimeout(() => window.location.reload(), 5000);
        }
    </script>
</body>
</html>
